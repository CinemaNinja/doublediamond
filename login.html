<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login | Double Diamond Moving & Storage</title>
    
    <!-- STYLES -->
    <link rel="stylesheet" href="./assets/css/variables.css">
    <link rel="stylesheet" href="./assets/css/styles.css">
    
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* LOGIN SPECIFIC OVERRIDES */
        body {
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #000;
        }

        .login-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            filter: blur(20px) brightness(0.4);
            transform: scale(1.1);
        }

        .login-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: var(--space-4);
            position: relative;
            z-index: 10;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-2xl);
            padding: 80px 70px;
            box-shadow: 0 60px 120px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            perspective: 1200px;
            /* Overrides for .service-card */
            overflow: visible !important;
            height: auto !important;
            justify-content: flex-start !important;
        }

        .login-logo {
            width: 250px;
            margin-top: -10px;
            margin-bottom: 70px;
            display: block;
            opacity: 1;
            pointer-events: none;
        }

        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 40px;
            position: relative;
            z-index: 50;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
            position: relative;
            z-index: 50;
        }

        .form-group label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--color-gray-400);
            font-weight: 700;
            padding-left: 2px;
        }

        .form-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--radius-lg);
            padding: 24px 28px;
            color: white;
            font-size: 20px;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            position: relative;
            z-index: 60;
            width: 100%;
            box-sizing: border-box;
            cursor: text;
        }

        .form-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            transform: scale(1.01);
        }

        .login-btn {
            margin-top: 10px;
            padding: 24px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-lg);
        }

        .login-footer {
            margin-top: var(--space-8);
            text-align: center;
        }

        .login-footer p {
            font-size: var(--text-sm);
            color: var(--color-gray-500);
            line-height: 1.6;
        }

        .back-link {
            position: fixed;
            top: var(--space-8);
            left: var(--space-8);
            color: white;
            text-decoration: none;
            font-size: var(--text-sm);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: var(--space-2);
            opacity: 0.6;
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    <canvas id="snow-canvas"></canvas>

    <!-- BACK LINK -->
    <a href="index.html" class="back-link magnetic">
        <span>←</span> Back to Main Site
    </a>

    <!-- BACKGROUND VIDEO (BLURRED) -->
    <div class="login-bg">
        <img src="./DD_ASSETS/aspen_mountains.png" alt="Double Diamond" style="width:100%; height:100%; object-fit:cover;">
    </div>

    <!-- MAIN LOGIN CONTAINER -->
    <div class="login-container">
        <div class="login-card service-card reveal active">
            <img src="./DD_ASSETS/dd_logo_white.png" alt="Double Diamond" class="login-logo">
            
            <form class="login-form" id="loginForm" action="https://accounts.doublediamondmoving.com/authenticate" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary login-btn magnetic" id="submitBtn">
                    Customer Login
                </button>
            </form>

            <div class="login-footer">
                <p>Need access? <br>Email <a href="mailto:info@doublediamondmoving.com" style="color:white; text-decoration:none; font-weight:600;">info@doublediamondmoving.com</a><br>or call (970) 927-3770</p>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="./assets/js/app.js"></script>
    <script>
        // PAGE SPECIFIC LOGIC
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            
            btn.innerText = 'Verifying...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            // Artificial delay to feel cinematic
            setTimeout(() => {
                alert('Connection to secure portal established. Redirecting...');
                window.location.href = "https://www.doublediamondmoving.com/customer-login";
            }, 1800);
        });
    </script>
</body>
</html>
